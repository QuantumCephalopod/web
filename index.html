<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>F33lings</title>
  <style>
    .aspect-name {
      position: absolute;
      z-index: 3;
    }

    .aspect-symbol {
      position: absolute;
      z-index: 1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #f8f6f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .sidecar {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 260px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      background: rgba(248, 246, 240, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      padding: 16px;
      z-index: 100;
      font-family: monospace;
      color: #111;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
    }
    .sidecar h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #000;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding-bottom: 8px;
    }
    .territory-item {
      padding: 8px 12px;
      margin-bottom: 4px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      font-size: 13px;
      opacity: 0.7;
    }
    .territory-item:hover {
      background: rgba(0, 0, 0, 0.05);
      opacity: 1;
    }
    .territory-item.active {
      background: #111;
      color: #f8f6f0;
      opacity: 1;
    }
    .domain-container {
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      background: rgba(255, 255, 255, 0.4);
      border-radius: 8px;
    }
    .domain-title {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #666;
      text-align: center;
    }

    /* ── Detail Panel (left side) ─────────────────────────────────────────── */
    #detail-panel {
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 260px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      background: rgba(248, 246, 240, 0.78);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 12px;
      padding: 18px 16px;
      z-index: 100;
      font-family: monospace;
      color: #111;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.07);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.42s ease;
    }
    #detail-panel.active {
      opacity: 1;
      pointer-events: auto;
    }
    .detail-address {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      padding-bottom: 8px;
    }
    .detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .detail-symbol {
      font-size: 26px;
      line-height: 1;
    }
    .detail-name {
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    .detail-essence {
      font-size: 11px;
      color: #555;
      font-style: italic;
      margin-bottom: 14px;
      line-height: 1.5;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding-bottom: 10px;
    }
    .detail-section {
      margin-bottom: 10px;
    }
    .detail-section-label {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #aaa;
      margin-bottom: 3px;
    }
    .detail-section-text {
      font-size: 11px;
      line-height: 1.55;
      color: #222;
    }
  </style>

</head>

<body>
  <div id="sidecar" class="sidecar">
    <h3>Domains</h3>
    <div id="territory-list"></div>
  </div>
  <!-- Detail Panel (left side — reveals on vertex hover) -->
  <div id="detail-panel">
    <div class="detail-address"></div>
    <div class="detail-header">
      <span class="detail-symbol"></span>
      <span class="detail-name"></span>
    </div>
    <div class="detail-essence"></div>
    <div class="detail-section">
      <div class="detail-section-label">create</div>
      <div class="detail-section-text detail-create"></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">copy</div>
      <div class="detail-section-text detail-copy"></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">control</div>
      <div class="detail-section-text detail-control"></div>
    </div>
  </div>

  <canvas id="c"></canvas>

  <!-- Project head router -->
  <script src="f33lings/f33lings.js"></script>
</body>

</html>
