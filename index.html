<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>⚜ Freedom — F33ling Tetrahedron (Tetrahedral Sublimation)</title>
  <style>
    .aspect-name {
      position: absolute;
      z-index: 3;
    }

    .aspect-symbol {
      position: absolute;
      z-index: 1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #f8f6f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .sidecar {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 260px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      background: rgba(248, 246, 240, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      padding: 16px;
      z-index: 100;
      font-family: monospace;
      color: #111;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
    }
    .sidecar h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #000;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding-bottom: 8px;
    }
    .territory-item {
      padding: 8px 12px;
      margin-bottom: 4px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      font-size: 13px;
      opacity: 0.7;
    }
    .territory-item:hover {
      background: rgba(0, 0, 0, 0.05);
      opacity: 1;
    }
    .territory-item.active {
      background: #111;
      color: #f8f6f0;
      opacity: 1;
    }
  </style>

  <!-- W Domain Foundation Data Object -->
  <script src="wDisplay_wFoundation.json"></script>
</head>

<body>
  <div id="sidecar" class="sidecar">
    <h3>Territories</h3>
    <div id="territory-list"></div>
  </div>
  <canvas id="c"></canvas>

  <!-- Tetrahedral Sequence Routing Mapping -->
  <script src="w_structure.js"></script>
  <script src="x_state.js"></script>
  <script src="y_relation.js"></script>
  <script src="z_output.js"></script>
</body>

</html>
