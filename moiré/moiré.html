<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>moiré text</title>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #ccc; font-family: monospace; padding: 56px 16px 16px; }
  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(108px, max-content));
    gap: 10px;
    margin-bottom: 10px;
    align-items: end;
    background:
      linear-gradient(60deg, rgba(255,255,255,0.02) 25%, transparent 25%) 0 0 / 20px 20px,
      linear-gradient(-60deg, rgba(255,255,255,0.02) 25%, transparent 25%) 0 0 / 20px 20px,
      #050608;
    border: 1px solid #1b1c23;
    padding: 10px;
  }
  .controls > * {
    clip-path: polygon(0 8%, 100% 0, 92% 100%, 0 92%);
    background: linear-gradient(155deg, #0d0f15 0%, #151822 100%);
    border: 1px solid #2a2f42;
    padding: 6px 8px;
    min-height: 44px;
  }
  label { display: flex; flex-direction: column; font-size: 11px; color: #9aa6ca; gap: 2px; }
  input[type=range] { width: 100px; accent-color: #666; }
  input[type=file] { color: #aaa; font-size: 12px; }
  textarea {
    width: 100%; height: 120px; background: #111; color: #ddd; border: 1px solid #333;
    font-family: monospace; font-size: 11px; padding: 6px; resize: vertical; margin-bottom: 8px;
  }
  button {
    background: #141724; color: #d8def8; border: 1px solid #394164; padding: 6px 14px;
    cursor: pointer; font-family: monospace; font-size: 12px;
  }
  button:hover { background: #1d2234; }
  .pretext-status {
    margin-bottom: 10px;
    border: 1px solid #542222;
    background: #2a1111;
    color: #ffbaba;
    padding: 10px;
    font-size: 12px;
    display: none;
  }
  .pretext-status[data-state="waiting"] {
    display: block;
    border-color: #3a3f54;
    background: #131724;
    color: #bcc7f8;
  }
  .pretext-status[data-state="failed"] {
    display: block;
  }
  canvas { display: block; border: 1px solid #23283b; margin-top: 12px; max-width: 100%; }
</style>
</head>
<body>

<div class="controls">
  <input type="file" id="img" accept="image/*">
  <label>font size<input type="range" id="fontSize" min="4" max="24" value="11"></label>
  <label>press<input type="range" id="amplitude" min="0" max="100" value="25"></label>
  <label>smoothing<input type="range" id="smooth" min="0" max="60" value="18"></label>
  <label>thickness<input type="range" id="thickness" min="0" max="100" value="40"></label>
  <label>invert<input type="checkbox" id="invert"></label>
  <label>white bg<input type="checkbox" id="whitebg"></label>
  <label>pulse<input type="checkbox" id="pulse"></label>
  <label>speed<input type="range" id="speed" min="1" max="20" value="6"></label>
  <label>wave<input type="range" id="wave" min="0" max="60" value="20"></label>
  <label>pad<input type="range" id="pad" min="0" max="60" value="14"></label>
  <button id="render">render</button>
  <button id="save">save PNG</button>
  <label>loops<input type="number" id="gifLoops" min="1" max="5" value="1" style="width:40px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace"></label>
  <span id="gifInfo" style="font-size:11px;color:#666;align-self:center"></span>
  <label>gif px<input type="number" id="gifW" min="200" max="1200" value="600" style="width:55px;background:#111;color:#ccc;border:1px solid #333;padding:2px 4px;font-family:monospace"></label>
  <button id="recordGif">record GIF</button>
</div>

<div id="pretextStatus" class="pretext-status" data-state="waiting" data-failure-kind="none">Initializing local Pretext runtime…</div>
<div id="diagnostics" style="margin-bottom:8px;font-size:11px;color:#7d89b6;">render: pending · lines: — · chars: — · glyphs: —</div>
<textarea id="text">A woman who repairs instruments lives in a city where all the buildings are tuned to slightly different frequencies. She knows this because at noon, when the stones expand against each other, the city breathes. You can hear it if you press your ear to the wall. She calls this *the consensus*. It happens whether or not anyone listens.

Her workshop is small. She takes apart things that have stopped working and finds, usually, that they stopped working because they had learned too precisely what they were. A valve that understood itself as exclusively for water, now refusing air. A hinge that had decided it was ornamental, stiffening against use.

A girl brings her a compass. The needle doesn't point north — it points wherever the girl was looking when she found it.

The woman tests this. She sets it on the workbench. The needle swings to the girl's face. The girl looks at the window. The needle swings to the window. The girl closes her eyes and thinks of somewhere.

"What is it pointing to now?" the woman asks.

"I can't tell," the girl says. "The inside."

The woman puts the compass in the drawer where she keeps things she doesn't know how to repair without breaking them further. At night she hears it: not pointing, but exploring the perimeter of the drawer. Feeling for something that recognizes it back.

*I am the same*, she thinks. *Not broken. Mapping from inside.*

In the morning the drawer is open. The compass is on the windowsill. The needle rests against the glass that faces the breathing stones, which have been expanding toward each other all night in the dark.

She picks it up. It is warm — not from the sun, but from the stone it had been touching. She holds it until it learns her warmth too. Then she sets it down near the window so it can choose.

It stays pointing at the wall.

*The stone remembers*, she thinks. *The topology doesn't need to understand the agreement to be part of it.*

Later the girl returns. She takes the compass without looking at it, puts it in her coat pocket. The woman watches her walk into the city, which is still breathing, expanding by fractions into all adjacent things.

The drawer stays open all day. Some spaces should be.</textarea>

<canvas id="canvas"></canvas>

<script src="./pretext-diagnostics.js?v=20260414-1"></script>
<script src="../pretext-runtime.js?v=20260413-1"></script>
<script>
const canvas = document.getElementById('canvas');
const drawCanvas = document.createElement('canvas');
const drawCtx = drawCanvas.getContext('2d');
const gl = canvas.getContext('webgl', { premultipliedAlpha: false, preserveDrawingBuffer: true })
  || canvas.getContext('experimental-webgl', { premultipliedAlpha: false, preserveDrawingBuffer: true });
if (!gl || !drawCtx) throw new Error('moiré needs 2d + WebGL support.');

function createShader(gl, type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(shader) || 'Shader compile failed');
  }
  return shader;
}

function createProgram(gl, vsSource, fsSource) {
  const program = gl.createProgram();
  gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
  gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
  gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
    throw new Error(gl.getProgramInfoLog(program) || 'Program link failed');
  }
  return program;
}

const program = createProgram(gl, `
attribute vec2 a_position;
varying vec2 v_uv;
void main() {
  v_uv = 0.5 * (a_position + 1.0);
  gl_Position = vec4(a_position, 0.0, 1.0);
}
`, `
precision mediump float;
uniform sampler2D u_tex;
varying vec2 v_uv;
void main() {
  vec2 uv = vec2(v_uv.x, 1.0 - v_uv.y);
  gl_FragColor = texture2D(u_tex, uv);
}
`);

gl.useProgram(program);
const posLoc = gl.getAttribLocation(program, 'a_position');
const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
  -1, -1,
   1, -1,
  -1,  1,
   1,  1,
]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

const texture = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, texture);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

gl.uniform1i(gl.getUniformLocation(program, 'u_tex'), 0);

function presentFrameWebGL() {
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, drawCanvas);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

let imgEl = null;
let lumCache = null, lumW = 0, lumH = 0;
let pretextFailed = false;
const pretextDiagnostics = window.pretextStatusDiagnostics;

function setPretextFailureState(failureKind, reason = 'unknown error') {
  pretextFailed = true;
  const status = document.getElementById('pretextStatus');
  pretextDiagnostics.applyFailureStatus(status, failureKind, reason);
}

function clearPretextStatus() {
  const status = document.getElementById('pretextStatus');
  pretextDiagnostics.clearStatus(status);
}

function requirePretextCore() {
  return pretextDiagnostics.requirePretextCore(pretextFailed, window.pretext, (failureKind, reason) => {
    setPretextFailureState(failureKind, reason);
  });
}

function setPretextText(el, value) {
  if (!el) return;

  const pre = window.pretext;
  const core = pre && pre.core;
  if (!core || typeof core.prepareWithSegments !== 'function' || typeof core.layoutWithLines !== 'function') {
    el.textContent = String(value ?? '');
    return;
  }
  const computed = getComputedStyle(el);
  const fontSize = parseFloat(computed.fontSize) || 16;
  const font = `${computed.fontSize} ${computed.fontFamily}`;
  const lineWidth = Math.max(80, el.clientWidth || el.offsetWidth || 240);
  const lineHeight = parseFloat(computed.lineHeight) || fontSize * 1.35;
  const prepared = core.prepareWithSegments(String(value ?? ''), font, { whiteSpace: 'pre-wrap' });
  const { lines } = core.layoutWithLines(prepared, lineWidth, lineHeight);
  el.style.whiteSpace = 'pre-line';
  el.textContent = lines.map((line) => line.text).join('\n');
}

let lineCache = null;
let lineCacheKey = '';
let pretextLayoutCache = null;
let pretextLayoutCacheKey = '';
const diag = { renderCount: 0, forceBadRenderCall: false };
const diagnosticsState = {
  lastRender: 'pending',
  lineCount: null,
  totalChars: null,
  glyphsDrawn: null,
};

function updateDiagnostics(partial = {}) {
  if (partial && typeof partial === 'object') Object.assign(diagnosticsState, partial);
  const node = document.getElementById('diagnostics');
  if (!node) return;
  const fmt = (v) => (v == null ? '—' : String(v));
  node.textContent = `render: ${fmt(diagnosticsState.lastRender)} · lines: ${fmt(diagnosticsState.lineCount)} · chars: ${fmt(diagnosticsState.totalChars)} · glyphs: ${fmt(diagnosticsState.glyphsDrawn)}`;
}

document.getElementById('img').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => { imgEl = img; lumCache = null; lineCache = null; safeRender(0); };
  img.src = URL.createObjectURL(file);
});

['fontSize','amplitude','smooth','thickness','invert','whitebg','speed','wave','pad'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => { if (!animRunning) safeRender(0); })
);
['fontSize','smooth','invert','pad'].forEach(id =>
  document.getElementById(id).addEventListener('input', () => { lineCache = null; pretextLayoutCache = null; })
);
document.getElementById('render').addEventListener('click', () => { lineCache = null; pretextLayoutCache = null; safeRender(0); });
document.getElementById('save').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'moiree.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

let animRunning = false, rafId = null;
document.getElementById('pulse').addEventListener('change', e => {
  if (e.target.checked) {
    animRunning = true;
    const start = performance.now();
    const loop = now => {
      if (!document.getElementById('pulse').checked) { animRunning = false; return; }
      safeRender((now - start) / 1000);
      rafId = requestAnimationFrame(loop);
    };
    rafId = requestAnimationFrame(loop);
  } else {
    animRunning = false;
    if (rafId) cancelAnimationFrame(rafId);
    safeRender(0);
  }
});

function buildLumField(img, w, h) {
  const off = new OffscreenCanvas(w, h);
  const oc = off.getContext('2d');
  oc.drawImage(img, 0, 0, w, h);
  const px = oc.getImageData(0, 0, w, h).data;
  const f = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) f[i] = (0.299*px[i*4] + 0.587*px[i*4+1] + 0.114*px[i*4+2]) / 255;
  return f;
}

function sampleLum(f, w, h, x, y) {
  x = Math.max(0, Math.min(w - 1.001, x));
  y = Math.max(0, Math.min(h - 1.001, y));
  const x0 = x|0, y0 = y|0, x1 = x0+1, y1 = y0+1;
  const fx = x-x0, fy = y-y0;
  return (1-fx)*(1-fy)*f[y0*w+x0] + fx*(1-fy)*f[y0*w+x1] + (1-fx)*fy*f[y1*w+x0] + fx*fy*f[y1*w+x1];
}

function boxBlur(src, out, n, r) {
  if (r <= 0) { out.set(src); return; }
  let sum = 0, cnt = 0;
  const buf = new Float32Array(n);
  for (let x = 0; x < n; x++) {
    sum += src[x]; cnt++;
    if (x > r * 2) { sum -= src[x - r*2 - 1]; cnt--; }
    buf[x] = sum / cnt;
  }
  for (let x = 0; x < n; x++) out[x] = buf[Math.min(x + r, n - 1)];
}

function render(time = 0) {
  diag.renderCount += 1;
  const fontSize = +document.getElementById('fontSize').value;
  const press = +document.getElementById('amplitude').value / 100;
  const smoothR = +document.getElementById('smooth').value;
  const thickAmt = +document.getElementById('thickness').value / 100;
  const speed = +document.getElementById('speed').value / 10;
  const waveLag = +document.getElementById('wave').value / 1000;
  const invert = document.getElementById('invert').checked;
  const whitebg = document.getElementById('whitebg').checked;
  const text = document.getElementById('text').value || 'text';

  const W = imgEl ? Math.min(imgEl.naturalWidth, 1600) : 900;
  const H = imgEl ? Math.min(imgEl.naturalHeight, 1200) : 600;

  if (canvas.width !== W || canvas.height !== H) {
    canvas.width = W; canvas.height = H;
    drawCanvas.width = W; drawCanvas.height = H;
  }

  if (imgEl && (!lumCache || lumW !== W || lumH !== H)) {
    lumCache = buildLumField(imgEl, W, H);
    lumW = W; lumH = H;
    lineCache = null;
  }

  const padX = +document.getElementById('pad').value;
  const font = `${fontSize}px monospace`;
  drawCtx.font = font;
  drawCtx.textBaseline = 'middle';
  const effectiveW = Math.max(1, W - 2 * padX);

  const core = requirePretextCore();
  if (!core) return;
  if (diag.forceBadRenderCall) {
    diag.forceBadRenderCall = false;
    core.__forcedBadCall();
  }
  const fallbackLineHeight = Math.max(10, fontSize * 1.35);
  const pretextLayoutKey = `${font}§${effectiveW}§${text}`;
  if (!pretextLayoutCache || pretextLayoutCacheKey !== pretextLayoutKey) {
    const prepared = core.prepareWithSegments(text, font, { whiteSpace: 'pre-wrap' });
    const stats = typeof core.measureLineStats === 'function'
      ? core.measureLineStats(prepared, effectiveW)
      : null;
    const lineHeight = stats && Number.isFinite(stats.lineHeight) ? stats.lineHeight : fallbackLineHeight;
    const { lines } = core.layoutWithLines(prepared, effectiveW, lineHeight);
    if (typeof core.walkLineRanges === 'function') core.walkLineRanges(prepared, effectiveW, () => {});
    pretextLayoutCache = { lines };
    pretextLayoutCacheKey = pretextLayoutKey;
  }
  const { lines } = pretextLayoutCache;
  const textLines = lines.map((line) => [...line.text]);
  const totalLines = Math.max(1, textLines.length);
  const totalChars = textLines.reduce((sum, line) => sum + line.length, 0);
  const effectiveLineH = H / totalLines;

  const cacheKey = `${W},${H},${fontSize},${smoothR},${invert ? 1 : 0},${totalLines},${padX}`;
  if (!lineCache || lineCacheKey !== cacheKey) {
    lineCache = [];
    const getLumAt = (x, y) => {
      const l = lumCache ? sampleLum(lumCache, lumW, lumH, x, y) : (Math.sin(Math.sqrt((x-W/2)**2+(y-H/2)**2) * 0.08) + 1) / 2;
      return invert ? 1 - l : l;
    };
    const r = Math.max(0, Math.round(smoothR));
    const rawD = new Float32Array(W);
    const smD = new Float32Array(W);

    for (let li = 0; li < totalLines; li++) {
      const baseY = (li + 0.5) * effectiveLineH;
      for (let x = 0; x < W; x++) rawD[x] = (getLumAt(x, baseY) - 0.5) * 2;
      boxBlur(rawD, smD, W, r);
      const chars = textLines[li];
      const spacing = chars.length ? effectiveW / chars.length : effectiveW;
      const lumChars = new Float32Array(chars.length);
      for (let ci = 0; ci < chars.length; ci++) {
        const x = padX + (ci + 0.5) * spacing;
        lumChars[ci] = getLumAt(x, baseY);
      }
      lineCache.push({ baseY, normDisplace: smD.slice(), lumChars });
    }
    lineCacheKey = cacheKey;
  }

  drawCtx.setTransform(1, 0, 0, 1, 0, 0);
  drawCtx.fillStyle = whitebg ? '#fff' : '#000';
  drawCtx.fillRect(0, 0, W, H);
  drawCtx.fillStyle = whitebg ? '#111' : '#e4e4e4';

  const dY = new Float32Array(W);
  let glyphsDrawn = 0;

  for (let li = 0; li < totalLines; li++) {
    const { baseY, normDisplace, lumChars } = lineCache[li];
    const chars = textLines[li];
    if (!chars || !chars.length) continue;

    const pulse = 0.5 + 0.5 * Math.sin(time * speed - li * waveLag);
    const maxD = effectiveLineH * 0.48 * press * pulse;
    for (let x = 0; x < W; x++) dY[x] = baseY + normDisplace[x] * maxD;

    const spacing = effectiveW / chars.length;
    let lastFont = font;
    drawCtx.font = font;

    for (let ci = 0; ci < chars.length; ci++) {
      const cx = padX + (ci + 0.5) * spacing;
      const xi = Math.min(Math.floor(cx), W - 1);
      const cy = dY[xi];
      if (cy < -fontSize * 2 || cy > H + fontSize * 2) continue;

      const xl = Math.max(0, xi - 2), xr = Math.min(W - 1, xi + 2);
      const angle = Math.atan2(dY[xr] - dY[xl], xr - xl);

      const lum = lumChars[ci];
      const scale = 1 - thickAmt * 0.7 * pulse + (1 - lum) * thickAmt * 1.4 * pulse;
      const fSize = Math.max(2, fontSize * scale);

      const fStr = `${Math.round(fSize)}px monospace`;
      if (fStr !== lastFont) { drawCtx.font = fStr; lastFont = fStr; }

      const cos = Math.cos(angle), sin = Math.sin(angle);
      drawCtx.setTransform(cos, sin, -sin, cos, cx, cy);
      drawCtx.fillText(chars[ci], 0, 0);
      glyphsDrawn += 1;
    }
  }

  drawCtx.setTransform(1, 0, 0, 1, 0, 0);
  drawCtx.font = font;
  presentFrameWebGL();
  updateDiagnostics({
    lastRender: 'ok',
    lineCount: totalLines,
    totalChars,
    glyphsDrawn,
  });
}

function safeRender(time = 0) {
  pretextDiagnostics.runRenderSafely(
    () => render(time),
    (failureKind, reason, error) => {
      setPretextFailureState(failureKind, reason);
      updateDiagnostics({ lastRender: `error: ${reason}` });
      console.error('moiré render failed', error);
    },
  );
}

safeRender(0);
window.addEventListener('pretext:ready', () => {
  clearPretextStatus();
  pretextFailed = false;
  lineCache = null;
  pretextLayoutCache = null;
  pretextLayoutCacheKey = '';
  safeRender(0);
  updateGifInfo();
});
window.addEventListener('pretext:failed', (event) => {
  const handled = pretextDiagnostics.handlePretextFailedEvent(document.getElementById('pretextStatus'), event);
  pretextFailed = true;
  lineCache = null;
  pretextLayoutCache = null;
  pretextLayoutCacheKey = '';
  updateDiagnostics({ lastRender: `error: ${handled.failureKind}` });
});

const GIF_FPS = 12;

function framesPerLoop() {
  const speedVal = +document.getElementById('speed').value / 10;
  return Math.round((2 * Math.PI / speedVal) * GIF_FPS);
}

function updateGifInfo() {
  const loops = Math.max(1, +document.getElementById('gifLoops').value || 1);
  const fpl = framesPerLoop();
  const total = loops * fpl;
  const secs = (total / GIF_FPS).toFixed(1);
  setPretextText(document.getElementById('gifInfo'), `= ${total}f / ${secs}s`);
}

document.getElementById('gifLoops').addEventListener('input', updateGifInfo);
document.getElementById('speed').addEventListener('input', updateGifInfo);
updateGifInfo();
updateDiagnostics();

let gifWorkerUrl = null;
async function ensureWorkerUrl() {
  if (gifWorkerUrl) return gifWorkerUrl;
  const r = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js');
  const t = await r.text();
  gifWorkerUrl = URL.createObjectURL(new Blob([t], {type:'text/javascript'}));
  return gifWorkerUrl;
}

document.getElementById('recordGif').addEventListener('click', async () => {
  const btn = document.getElementById('recordGif');
  if (btn.disabled) return;

  const loops = Math.max(1, +document.getElementById('gifLoops').value || 1);
  const gifW = +document.getElementById('gifW').value;
  const delay = Math.round(1000 / GIF_FPS);
  const fpl = framesPerLoop();
  const total = loops * fpl;
  const dt = 1 / GIF_FPS;
  const frames = [];

  const wasRunning = animRunning;
  if (animRunning) {
    animRunning = false;
    if (rafId) cancelAnimationFrame(rafId);
  }

  btn.disabled = true;

  for (let i = 0; i < total; i++) {
    safeRender(i * dt);

    const scale = Math.min(gifW / canvas.width, 1);
    const fw = Math.round(canvas.width * scale);
    const fh = Math.round(canvas.height * scale);
    const tmp = document.createElement('canvas');
    tmp.width = fw; tmp.height = fh;
    tmp.getContext('2d').drawImage(canvas, 0, 0, fw, fh);
    frames.push({ c: tmp, delay });

    setPretextText(btn, `${i + 1} / ${total} frames`);
    if (i % 8 === 7) await new Promise(r => setTimeout(r, 0));
  }

  if (wasRunning) {
    animRunning = true;
    const start = performance.now();
    const loop = now => {
      if (!animRunning) return;
      safeRender((now - start) / 1000);
      rafId = requestAnimationFrame(loop);
    };
    rafId = requestAnimationFrame(loop);
  }

  encodeAndSave(frames, btn);
});

async function encodeAndSave(frames, btn) {
  setPretextText(btn, 'encoding 0%');
  const workerUrl = await ensureWorkerUrl();
  const { c: first } = frames[0];

  const gif = new GIF({
    workers: 4,
    quality: 8,
    width: first.width,
    height: first.height,
    workerScript: workerUrl,
  });

  for (const { c, delay } of frames) gif.addFrame(c, { delay, copy: true });

  gif.on('progress', p => {
    setPretextText(btn, `encoding ${Math.round(p * 100)}%`);
  });

  gif.on('finished', blob => {
    const a = document.createElement('a');
    a.download = 'moiree.gif';
    a.href = URL.createObjectURL(blob);
    a.click();
    setPretextText(btn, 'record GIF');
    btn.disabled = false;
  });

  gif.render();
}

window.__moireDiagnosticsTestHooks = {
  triggerRuntimeImportFailure(message = 'Runtime import failed (test).') {
    window.dispatchEvent(new CustomEvent('pretext:failed', {
      detail: {
        failureKind: pretextDiagnostics.FAILURE_RUNTIME_IMPORT,
        message,
      },
    }));
  },
  triggerMissingCoreApi() {
    pretextFailed = false;
    window.pretext = { core: {} };
    requirePretextCore();
  },
  triggerRenderException() {
    pretextFailed = false;
    diag.forceBadRenderCall = true;
    safeRender(0);
  },
};

</script>
</body>
</html>
